name: Kawaii CI Pipeline 🌸

# Trigger workflow khi có sự kiện push hoặc tạo pull_request
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy code về nè (Checkout code) 📥
      uses: actions/checkout@v4

    - name: Cài đặt môi trường Java 17 ☕
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Chạy Test và Package với Maven 🚀
      # Lệnh này sẽ chạy qua tất cả các pha: compile, test, và đóng gói thành file .jar
      run: mvn -B clean package

    - name: Lưu trữ thành quả (Upload Artifact) 🎁
      uses: actions/upload-artifact@v4
      with:
        name: kawaii-app-jar
        path: target/*.jar
        # File jar bé xinh đã được lưu lại thành công rồi nha!